<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDROMEDA | CRM SMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 13px; scroll-behavior: smooth; }
        .status-idea { border-left: 5px solid #9ca3af; }
        .status-work { border-left: 5px solid #3b82f6; }
        .status-ready { border-left: 5px solid #10b981; }
        .status-published { border-left: 6px solid #6366f1; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background-color: #e2e8f0; gap: 1px; border: 1px solid #e2e8f0; }
        .calendar-day { min-height: 110px; background-color: white; padding: 4px; overflow-y: auto; }
        .calendar-item { font-size: 8px; margin-bottom: 2px; padding: 2px 4px; border-radius: 4px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; display: block; }
        .multi-select-box { max-height: 130px; overflow-y: auto; border: 1px solid #e2e8f0; padding: 8px; border-radius: 12px; background: #f8fafc; }
        .tab-active { background: #1e293b !important; color: white !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #loginOverlay { background: radial-gradient(circle at center, #1e293b 0%, #000 100%); z-index: 9999; position: fixed; inset: 0; }
        .admin-only { display: none; }
        #chatMessages::-webkit-scrollbar { width: 3px; }
        #chatMessages::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .social-icon { width: 18px; height: 18px; display: inline-block; vertical-align: middle; transition: transform 0.2s; }
        .social-icon:hover { transform: scale(1.2); }
    </style>

<body class="bg-[#f1f5f9] min-h-screen text-slate-900">

            <div class="space-y-4">
                <select id="loginUser" class="w-full border-2 p-3.5 rounded-2xl font-bold outline-none text-xs bg-slate-50 text-center appearance-none cursor-pointer text-slate-800">
                    <option value="Андрей Чебыкин">Андрей Чебыкин</option>
                    <option value="Павел Храмцов">Павел Храмцов</option>
                    <option value="Дмитрий Хандюков">Дмитрий Хандюков</option>
                    <option value="Любовь Карелина">Любовь Карелина</option>

                    <option value="Анастасия Ершова">Анастасия Ершова</option>

                </select>
                <input type="password" id="loginPass" placeholder="Пароль" class="w-full border-2 p-3.5 rounded-2xl font-bold text-center outline-none">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs hover:bg-black transition-all active:scale-95">Войти</button>
                <p id="loginError" class="text-rose-500 text-[10px] font-black uppercase hidden mt-4 italic">Ошибка доступа</p>
            </div>
        </div>
    </div>

    <!-- APP CONTENT -->
    <div id="appContent" class="hidden opacity-0 transition-opacity duration-500">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-3 shadow-sm">
            <div class="max-w-[1800px] mx-auto flex justify-between items-center">
                <div class="flex items-center gap-10">
                    <div class="flex flex-col">
                        <h1 class="text-xl font-black text-slate-900 leading-none">ANDROMEDA</h1>
                        <span class="text-[9px] font-black text-blue-600 uppercase italic">CRM SMM Professional</span>
                    </div>
                    <div class="flex bg-slate-100 p-1 rounded-xl font-black text-[9px] gap-1">
                        <button onclick="switchView('list')" id="btnViewList" class="px-5 py-2 rounded-lg transition uppercase tab-active">Список</button>
                        <button onclick="switchView('calendar')" id="btnViewCalendar" class="px-5 py-2 rounded-lg transition uppercase text-slate-400">Календарь</button>
                        <button onclick="switchView('stats')" id="btnViewStats" class="px-5 py-2 rounded-lg transition uppercase text-slate-400">Статистика</button>
                        <button onclick="switchView('accounts')" id="btnViewAccounts" class="px-5 py-2 rounded-lg transition uppercase text-slate-400">Аккаунты</button>
                    </div>
                </div>
                <div class="flex gap-4 items-center">
                    <button onclick="openTrash()" class="relative border p-2 rounded-xl bg-slate-50 shadow-sm">🗑️ <span id="trashBadge" class="absolute -top-1 -right-1 bg-slate-900 text-white text-[7px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
                    <div id="currentUserDisplay" class="text-[10px] font-black uppercase text-slate-900 px-4 py-2 border-l border-slate-100"></div>
                    <button onclick="logout()" class="text-rose-500 font-bold text-[9px] uppercase hover:underline transition">Выход</button>
                </div>
            </div>
        </header>

        <main class="max-w-[1800px] mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- ASIDE: CREATE -->

        // --- STATS & CSV ---
        function changeStatsMonth(offset) { statsDate.setMonth(statsDate.getMonth() + offset); renderStats(); }

        function renderStats() {
            const filter = document.getElementById('statsPlatformFilter').value, label = document.getElementById('statsMonthLabel');
            label.innerText = statsDate.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
            let totalV = 0, totalP = 0;
            const results = contentData.filter(i => {
                const d = new Date(i.date);
                const dateMatch = d.getMonth() === statsDate.getMonth() && d.getFullYear() === statsDate.getFullYear();
                if (!dateMatch) return false;
                if (i.status !== 'published') return false;
                if (filter === 'ALL') return true;
                if (filter === 'Telegram') return TG_LIST.some(tg => i.links && i.links[tg]);
                return i.links && i.links[filter];
            });
            let html = `<table class="w-full text-left text-[10px] text-slate-800 font-black uppercase"><thead class="bg-slate-50 text-[8px] font-black uppercase text-slate-400"><tr><th class="p-4">Дата</th><th class="p-4">Тема</th><th class="p-4">Охват</th><th class="p-4 text-center">Линки</th></tr></thead><tbody>`;
            results.forEach(i => {
                let v = 0, linksHtml = '';
                if (filter === 'ALL') {
                    v = i.play_count || 0;
                    linksHtml = Object.entries(i.links || {}).map(([p, url]) => url ? `<a href="${url}" target="_blank" class="mx-1">${getSocialIcon(p)}</a>` : '').join('');
                } else if (filter === 'Telegram') {
                    TG_LIST.forEach(tg => { v += (i.play_counts?.[tg] || 0); if(i.links?.[tg]) linksHtml += `<a href="${i.links[tg]}" target="_blank" class="mx-1">${getSocialIcon(tg)}</a>`; });
                } else {
                    v = (i.play_counts?.[filter] || 0); if(i.links?.[filter]) linksHtml = `<a href="${i.links[filter]}" target="_blank">${getSocialIcon(filter)}</a>`;
                }
                totalV += v; totalP++;
                html += `<tr class="border-b"><td class="p-4 whitespace-nowrap">${new Date(i.date).toLocaleDateString('ru-RU')}</td><td class="p-4 font-bold uppercase truncate max-w-[200px] text-slate-700">${i.title}</td><td class="p-4 font-black text-emerald-600">${v.toLocaleString()}</td><td class="p-4 text-center">${linksHtml}</td></tr>`;
            });
            document.getElementById('stat-total').innerText = totalP; document.getElementById('stat-views').innerText = totalV.toLocaleString();
            document.getElementById('statsTableContainer').innerHTML = html + `</tbody></table>`;
        }

        function exportStatsToCSV() {
            const results = contentData.filter(i => { const d = new Date(i.date); return i.status === 'published' && d.getMonth() === statsDate.getMonth() && d.getFullYear() === statsDate.getFullYear(); });
            if (results.length === 0) return alert("Нет данных");
            let csv = "\uFEFFДата;Тема;Тег;Тип;Охват;Ответственный;Ссылки\n";
            results.forEach(i => {
                const lnks = Object.values(i.links || {}).filter(u => u).join(' | ');
                csv += `"${new Date(i.date).toLocaleDateString('ru-RU')}";"${i.title}";"${i.tag}";"${i.work_type}";"${i.play_count}";"${i.responsible}";"${lnks}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }), url = URL.createObjectURL(blob), link = document.createElement("a");
            link.href = url; link.download = `Report_${statsDate.getMonth()+1}_${statsDate.getFullYear()}.csv`; link.click();
        }

        // --- STATS LOGIC ---
        async function fetchSingleStat(url, platform) {
            if (!url || url.length < 10) return 0;
            const YT_KEY = localStorage.getItem('yt_key'), AP_TOKEN = localStorage.getItem('apify_token');
            try {
                if (platform === 'VK' && AP_TOKEN) {
                    const actor = "apify/vkontakte-scraper";
                    const input = { startUrls: [{ url: url }], maxItems: 1 };
                    const res = await fetch(`https://api.apify.com/v2/acts/${actor}/run-sync-get-dataset-items?token=${AP_TOKEN}`, {
                        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(input)});
                    const d = await res.json();
                    if (d[0]) return d[0].viewsCount || d[0].views?.count || d[0].stats?.views || 0;
                }
                if (TG_LIST.includes(platform) || url.includes('t.me/')) {
                    let sUrl = url.trim().replace('t.me/', 't.me/s/');
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(sUrl)}`);
                    const d = await res.json(), m = d.contents.match(/class="tgme_widget_message_views">([\d.KM]+)</i);
                    if (m) { let t = m[1].toUpperCase(); return t.includes('K') ? parseFloat(t)*1000 : (t.includes('M') ? parseFloat(t)*1000000 : parseInt(t.replace(/\D/g,'')) || 0); }
                }
                if (platform === 'YouTube' && YT_KEY) {
                    const vidId = (url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/)||[])[2];
                    if (vidId) { const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${vidId}&key=${YT_KEY}`); const d = await res.json(); return parseInt(d.items?.[0]?.statistics?.viewCount || 0); }
                }
                if ((platform === 'TikTok' || platform === 'Instagram') && AP_TOKEN) {
                    const actor = platform === 'TikTok' ? "GdWCkxBtKWOsKjdch" : "apify/instagram-post-scraper";
                    const input = platform === 'TikTok' ? { postURLs: [url] } : { directUrls: [url] };
                    const res = await fetch(`https://api.apify.com/v2/acts/${actor}/run-sync-get-dataset-items?token=${AP_TOKEN}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(input)});
                    const d = await res.json(); if (d[0]) return d[0].playCount || d[0].videoViewCount || d[0].videoPlayCount || d[0].likesCount || 0;
                }
            } catch (e) { return 0; } return 0;
        }

        async function updateAllMonthStats() {
            const btn = document.getElementById('btnUpdateAll'); btn.innerText = "..."; btn.disabled = true;
            const tasks = contentData.filter(t => t.links && Object.keys(t.links).length > 0 && new Date(t.date).getMonth() === statsDate.getMonth());
            for (let t of tasks) {
                let sum = 0; let pCounts = t.play_counts || {};
                for (let [p, url] of Object.entries(t.links)) { if (url) { const v = await fetchSingleStat(url, p); pCounts[p] = v; sum += v; } }
                await _supabase.from('tasks').update({ play_counts: pCounts, play_count: sum }).eq('id', t.id);
            }
            await loadAllData(); btn.innerText = "Обновить"; btn.disabled = false;
        }

        };
        document.getElementById('ideaForm').onsubmit = async (e) => {
            e.preventDefault(); const task = { id: Date.now(), title: document.getElementById('title').value, work_type: document.getElementById('work_type').value, tag: document.getElementById('tag').value, description: document.getElementById('description').value, channels: Array.from(document.querySelectorAll('input[name="chan"]:checked')).map(c => c.value), executors: Array.from(document.querySelectorAll('input[name="exec"]:checked')).map(c => c.value), responsible: sessionStorage.getItem('e_name'), start_date: document.getElementById('start_date_val').value || new Date().toISOString().split('T')[0], date: document.getElementById('date_val').value || new Date().toISOString().split('T')[0], status: 'idea', links: {}, play_counts: {}, play_count: 0, is_deleted: false };
            await _supabase.from('tasks').insert([task]); await loadAllData(); e.target.reset(); document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        };
        async function moveToTrash(id) { await _supabase.from('tasks').update({ is_deleted: true, deleted_by: sessionStorage.getItem('e_name') }).eq('id', id); await loadAllData(); }
        async function restoreFromTrash(id) { await _supabase.from('tasks').update({ is_deleted: false, deleted_by: null }).eq('id', id); await loadAllData(); }
        async function finalDelete(id) { if(confirm("Навсегда?")) { await _supabase.from('tasks').delete().eq('id', id); await loadAllData(); } }
        async function saveAdminSettings() { const yt = document.getElementById('ytApiKey').value, ap = document.getElementById('apifyToken').value; await _supabase.from('config').upsert({id: 'yt_key', value: yt}); await _supabase.from('config').upsert({id: 'apify_token', value: ap}); alert("Ключи сохранены!"); await loadAllData(); }

        // --- UTILS ---
        function switchView(v) { 
            currentView = v; ['list', 'calendar', 'stats', 'accounts'].forEach(id => { 
                const btn = document.getElementById('btnView' + id.charAt(0).toUpperCase() + id.slice(1));
                const view = document.getElementById('view-' + id);
                if(view) view.classList.toggle('hidden', id !== v); 
                if(btn) btn.classList.toggle('tab-active', id === v); 
            });
            document.getElementById('listControls').classList.toggle('hidden', v !== 'list'); renderAll(); 
        }
        function logout() { sessionStorage.clear(); location.reload(); }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function closeTrash() { document.getElementById('trashModal').style.display = 'none'; }
        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
        function toggleAllChannels(s, n) { document.getElementsByName(n).forEach(cb => cb.checked = s.checked); }

        function openTrash() { 
            const isAdmin = sessionStorage.getItem('e_role') === 'admin', list = document.getElementById('trashList'); list.innerHTML = trashData.length ? '' : '<p class="text-center py-10 opacity-30">ПУСТО</p>';
            trashData.forEach((i) => { const div = document.createElement('div'); div.className = "flex justify-between items-center bg-white p-4 rounded-xl border mb-2 shadow-sm"; div.innerHTML = `<div><div class="text-[10px] font-black uppercase mb-1 leading-none text-slate-800">${i.title}</div><div class="text-[7px] text-rose-500 font-bold uppercase mt-1">Удалил: ${i.deleted_by || '???'}</div></div><div class="flex gap-2">${isAdmin ? `<button onclick="restoreFromTrash('${i.id}')" class="bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-[8px] font-black uppercase">RESTORE</button><button onclick="finalDelete('${i.id}')" class="bg-rose-500 text-white px-3 py-1.5 rounded-lg text-[8px] font-black uppercase">DELETE</button>` : ''}</div>`; list.appendChild(div); });
            document.getElementById('trashModal').style.display = 'flex';
        }
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
            const label = document.getElementById('calendarMonthLabel'); label.innerText = new Intl.DateTimeFormat('ru-RU', { month: 'long', year: 'numeric' }).format(viewDate);
            const y = viewDate.getFullYear(), m = viewDate.getMonth(), shift = (new Date(y, m, 1).getDay() || 7) - 1;
            for (let i = 0; i < shift; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'calendar-day bg-slate-50 opacity-40'}));
            for (let d = 1; d <= new Date(y, m + 1, 0).getDate(); d++) {
                const cell = document.createElement('div'); cell.className = 'calendar-day border-r border-b'; cell.innerHTML = `<div class="text-[9px] font-black text-slate-200">${d}</div>`;
                const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                contentData.forEach(i => { if (calendarChannel === 'ALL' || i.channels?.includes(calendarChannel)) { if (i.start_date === dStr) { const item = document.createElement('div'); item.className = `calendar-item border border-dashed opacity-60`; item.innerHTML = `🚀 ${i.title}`; item.onclick = () => openEditModal(i.id); cell.appendChild(item); } if (i.date === dStr) { const item = document.createElement('div'); item.className = `calendar-item status-${i.status}`; item.innerHTML = `🏁 ${i.title}`; item.onclick = () => openEditModal(i.id); cell.appendChild(item); } } });
                grid.appendChild(cell);
            }
        }
        function renderCalendarTabs() { const container = document.getElementById('calendarTabs'); container.innerHTML = `<button onclick="setCalChannel('ALL')" class="px-3 py-2 border rounded-xl ${calendarChannel==='ALL'?'tab-active':'bg-white text-slate-400'} uppercase">ОБЩИЙ</button>`; CHANNELS.forEach(ch => container.innerHTML += `<button onclick="setCalChannel('${ch}')" class="px-3 py-2 border rounded-xl ${calendarChannel===ch?'tab-active':'bg-white text-slate-400'} uppercase">${ch}</button>`); }
        function setCalChannel(ch) { calendarChannel = ch; renderCalendarTabs(); renderCalendar(); }
        function renderPersonalTasks() {
            const name = sessionStorage.getItem('e_name'), list = document.getElementById('personalTasksList');
            const mine = contentData.filter(i => (i.executors?.includes(name) || i.responsible === name) && i.status !== 'published');
            list.innerHTML = mine.length ? '' : '<p class="text-center py-10 opacity-20 font-black uppercase text-[8px]">Задач нет</p>';
            mine.forEach(i => { const div = document.createElement('div'); div.className = "p-4 rounded-2xl bg-slate-800 hover:bg-slate-700 cursor-pointer transition shadow-lg mb-2"; div.onclick = () => openEditModal(i.id); div.innerHTML = `<div class="text-[7px] text-blue-400 font-black mb-1 uppercase">${i.work_type || 'Пост'}</div><div class="text-[9px] font-black uppercase text-white leading-tight">${i.title}</div>`; list.appendChild(div); });
        }
        checkAuth();
    </script>
</body>
</html>
